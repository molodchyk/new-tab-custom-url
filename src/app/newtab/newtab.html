<!doctype html>
<html lang="en" data-blank-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title data-i18n-title="extensionName">New Tab: Custom URL</title>
    <link rel="stylesheet" href="./newtab.css">
  </head>
  <body class="newtab-body">
    <main id="status" class="status-panel" hidden>
      <h1 id="status-title" data-i18n="newTabStatusTitle">New Tab</h1>
      <p id="status-message"></p>
      <div class="status-actions">
        <button id="open-options" type="button" data-i18n="openOptionsButton">Open Options</button>
        <button id="open-details" type="button" class="secondary" data-i18n="extensionDetailsButton">Extension Details</button>
      </div>
    </main>

    <script type="module" src="./index.js"></script>
  </body>
</html>
