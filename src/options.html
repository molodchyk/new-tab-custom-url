<!doctype html>
<html lang="en" data-blank-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>New Tab: Custom URL Options</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options-body">
    <main class="options-shell">
      <header>
        <h1>New Tab: Custom URL</h1>
        <p>Set the page Chrome opens for new tabs.</p>
      </header>

      <form id="options-form" class="settings-form">
        <label class="field">
          <span>New tab URL</span>
          <input id="target-url" name="targetUrl" autocomplete="url" spellcheck="false" placeholder="https://example.com or file:///C:/page.html">
        </label>

        <section class="field-group" aria-labelledby="focus-label">
          <h2 id="focus-label">Focus</h2>
          <label class="choice">
            <input type="radio" name="focusMode" value="page">
            <span>Focus the loaded page</span>
          </label>
          <label class="choice">
            <input type="radio" name="focusMode" value="address-bar">
            <span>Keep the address bar workflow</span>
          </label>
        </section>

        <label class="field">
          <span>Blank page theme</span>
          <select id="blank-theme" name="blankTheme">
            <option value="system">System</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>

        <label class="choice">
          <input id="custom-background-enabled" type="checkbox" name="customBackgroundEnabled">
          <span>Use custom blank/redirect background</span>
        </label>

        <label class="field compact-field">
          <span>Background color</span>
          <input id="custom-background-color" type="color" name="customBackgroundColor" value="#0d1117">
        </label>

        <label class="choice">
          <input id="sync-enabled" type="checkbox" name="syncEnabled">
          <span>Sync settings with Chrome profile</span>
        </label>

        <section class="field-group status-grid" aria-labelledby="access-label">
          <h2 id="access-label">Browser Access</h2>
          <p id="file-access-status" class="status-line">Checking file access...</p>
          <p id="incognito-access-status" class="status-line">Checking incognito access...</p>
        </section>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="button-row">
          <button type="submit">Save</button>
          <button id="reset" type="button" class="secondary">Reset</button>
          <button id="details" type="button" class="secondary">Extension Details</button>
        </div>
      </form>
    </main>

    <script src="settings.js"></script>
    <script src="options.js"></script>
  </body>
</html>
