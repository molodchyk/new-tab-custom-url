<!doctype html>
<html lang="en" data-blank-theme="system">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>New Tab: Custom URL</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <h1>New Tab: Custom URL</h1>

      <form id="popup-form" class="popup-form">
        <label class="field">
          <span>New tab URL</span>
          <input id="popup-target-url" autocomplete="url" spellcheck="false" placeholder="https://example.com">
        </label>

        <div id="popup-messages" class="messages" aria-live="polite"></div>

        <div class="button-row">
          <button type="submit">Save</button>
          <button id="popup-options" type="button" class="secondary">Options</button>
          <button id="popup-reset" type="button" class="secondary">Reset</button>
        </div>
      </form>
    </main>

    <script src="settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
